<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Page</title>
  <style>
    body {
    margin: 0;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;

    background-image: url("background.png"); /* your image */
    background-size: 20%;
    background-repeat: repeat;               /* tile it */
    }


    h1 {
      margin: 20px 0 10px;
      font-size: 40px;
    }

    .menu {
      display: flex;
      flex-direction: row;
      gap: 30px;
      margin-bottom: 30px;
      background-color: rgba(0, 0, 0, 1); 
    }

    .menu a {
      text-decoration: none;
      color: #ec7c7c;
    }

    .center-image {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 50px;
    }

    img {
      max-width: 500px;
    }
  </style>
</head>
<body>

  <h1>

  <nav class="menu">
    <a href="#">Calendar</a>
    <a href="#">Bulletin</a>
    <a href="#">About</a>
    <a href="#">Donate</a>
  </nav>

  </h1>

  
<!-- 
<div class="center-image"></div>
<img src="chaus.png" alt="Placeholder image">
-->
  

</body>
</html>
